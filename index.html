<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ᴄʙ Bank">
  <meta name="theme-color" content="#0A0A0A">
  <title>ᴄʙ Bank</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="screen-login">
    <div class="login-wrap">
      <div class="login-logo"><span class="cb-mark">ᴄʙ</span> Bank</div>
      <div class="login-sub">cool bucks for cool bitches</div>
      <div class="login-who">who are you?</div>
      <div id="login-member-grid" class="login-member-grid"></div>
    </div>
  </div>

  <!-- ══ MAIN APP (hidden until logged in) ══ -->
  <div id="app" class="hidden">

    <!-- ── FEED TAB ── -->
    <section id="tab-feed" class="tab-pane active">
      <header class="page-header">
        <h1 class="header-title"><span class="cb-mark">ᴄʙ</span> Bank</h1>
        <button class="btn-ghost" id="btnSend">Send ᴄʙ</button>
      </header>
      <div id="members-strip" class="members-strip"></div>
      <div id="feed-list" class="feed-list"></div>
    </section>

    <!-- ── MARKETPLACE TAB ── -->
    <section id="tab-marketplace" class="tab-pane">

      <header class="page-header">
        <h1 class="header-title">Marketplace</h1>
        <button class="btn-ghost" id="btnOffer">Offer <span class="cb-mark">ᴄʙ</span></button>
      </header>

      <div class="mkt-filter-bar" id="mktFilterBar">
        <button class="mkt-chip" data-filter="yours">Yours</button>
        <button class="mkt-chip" data-filter="open">Open</button>
        <button class="mkt-chip" data-filter="bet">Bets</button>
        <button class="mkt-chip" data-filter="bounty">Bounties</button>
        <button class="mkt-chip" data-filter="quest">Quests</button>
        <button class="mkt-chip" data-filter="offering">Offerings</button>
      </div>

      <div class="mkt-feed" id="mktFeed"></div>

    </section>

    <!-- ── PROFILE TAB ── -->
    <section id="tab-profile" class="tab-pane">
      <header class="page-header">
        <h1 class="header-title">Profile</h1>
        <button class="btn-ghost" id="btnSignOut">Sign out</button>
      </header>
      <div id="profile-body" class="profile-body"></div>
    </section>

    <!-- ── BOTTOM NAV ── -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="feed">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 12h4M3 7h7M3 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 17l3 4 3-8 3 4 2-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Feed</span>
      </button>
      <button class="nav-item" data-tab="marketplace">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Market</span>
      </button>
      <button class="nav-item" data-tab="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M4 21c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- ── MODAL ── -->
    <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal-sheet" id="modal-sheet">
        <div class="modal-handle"></div>
        <div id="modal-content"></div>
      </div>
    </div>

    <!-- ── TOAST ── -->
    <div id="toast" class="toast" aria-live="polite"></div>

  </div><!-- /#app -->

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="config.js"></script><!-- gitignored: holds Firebase config -->
  <script src="app.js"></script>
</body>
</html>
